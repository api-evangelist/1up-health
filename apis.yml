apis:
- name: 1upHealth FHIR R4 API
  description: 'Core FHIR R4 REST API providing full CRUD operations on all HL7 FHIR
    R4 resources including Patient, Encounter, ExplanationOfBenefit, Observation,
    Medication, and more. Supports dynamic search, version histories, Provenance,
    and AuditEvent tracking in a HIPAA-compliant cloud. Authentication via OAuth 2.0
    with client credentials and authorization code flows.

    '
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://docs.1up.health/docs
  baseURL: https://gateway.1up.health
  tags:
  - FHIR R4
  - Health Records
  - Patient Data
  properties:
  - type: Documentation
    url: https://docs.1up.health/docs
  - type: OpenAPI
    url: https://docs.1up.health/help-center/Content/en-US/api-references/rest-api-reference.html
  - url: graphql/1up-health-graphql.md
    type: GraphQL
- name: 1upHealth Patient Access API
  description: 'FHIR-conformant Patient Access API enabling patients and authorized
    applications to access clinical and claims data from health plans. Implements
    CMS Interoperability and Patient Access Final Rule requirements using SMART on
    FHIR and OAuth 2.0 authorization code flow. Supports patient demographics, labs,
    medications, procedures, allergies, and claims data.

    '
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://docs.1up.health/help-center/Content/en-US/get-started/cms-patient-access/developer-overview.html
  baseURL: https://gateway.1up.health
  tags:
  - Patient Access
  - SMART on FHIR
  - CMS Compliance
  properties:
  - type: Documentation
    url: https://docs.1up.health/help-center/Content/en-US/get-started/cms-patient-access/developer-overview.html
- name: 1upHealth Provider Access API
  description: 'FHIR Bulk Export API enabling in-network providers to access member
    clinical, claims, encounter, and prior authorization data within one business
    day of a valid request. Covers all USCDI v1 data classes for encounters within
    5 years and adjudicated claims from January 1, 2016 onward. Uses OAuth 2.0 client
    credentials flow.

    '
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://1up.health/products/1up-comply/1up-provider-access-api/
  baseURL: https://gateway.1up.health
  tags:
  - Provider Access
  - Bulk Data
  - FHIR Bulk Export
  properties:
  - type: Documentation
    url: https://docs.1up.health/help-center/Content/en-US/api-references/apis.html
- name: 1upHealth Payer-to-Payer Data Exchange API
  description: 'FHIR Bulk Export API enabling payers to exchange member clinical and
    claims data during member transitions between health plans. Supports CMS Interoperability
    and Prior Authorization Final Rule requirements. Uses OAuth 2.0 client credentials
    flow with bulk-data scope.

    '
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://docs.1up.health/help-center/Content/en-US/api-references/apis.html
  baseURL: https://gateway.1up.health
  tags:
  - Payer-to-Payer
  - Data Exchange
  - Bulk Data
  properties:
  - type: Documentation
    url: https://docs.1up.health/help-center/Content/en-US/api-references/apis.html
- name: 1upHealth Provider Directory API
  description: 'FHIR-conformant Provider Directory API providing accurate, up-to-date
    provider information to support CMS requirements for Medicare Advantage plans.
    Includes practitioner, organization, location, and network data aligned with DaVinci
    PDEX Plan Net Implementation Guide.

    '
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://1up.health/
  baseURL: https://gateway.1up.health
  tags:
