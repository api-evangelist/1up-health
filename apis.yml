- name: 1upHealth System Search API
  description: 'API for searching and connecting to health systems and payer networks,
    enabling applications to discover available FHIR endpoints and initiate patient
    record connections across the 1upHealth network of connected payers and providers.

    '
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
