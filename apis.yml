    url: https://docs.1up.health/help-center/Content/en-US/api-references/apis.html
- name: 1upHealth Electronic Prior Authorization API
  description: 'FHIR-based Electronic Prior Authorization (ePA) API integrating clinical
    data and AI to streamline prior authorization workflows between payers and providers.
    Supports CMS Interoperability and Prior Authorization Final Rule compliance requirements.

    '
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://1up.health/
  baseURL: https://gateway.1up.health
  tags:
