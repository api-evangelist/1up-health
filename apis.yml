aid: api-evangelist-1up-health
name: 1upHealth
description: '1upHealth is a FHIR-based health data interoperability platform providing
  REST APIs for connecting patient records across payers and providers. The platform
  supports HL7 FHIR R4, SMART on FHIR, OAuth 2.0, and bulk data export, enabling health
  plans to acquire, manage, exchange, and analyze clinical and claims data in a HIPAA-compliant
  cloud environment. Products include Patient Access, Provider Access, Payer-to-Payer
  Data Exchange, Provider Directory, Electronic Prior Authorization, and Formulary
  APIs.

  '
type: Index
