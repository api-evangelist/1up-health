# ---------------------------------------------------------------------------
# Mutation root
# ---------------------------------------------------------------------------

type Mutation {
  # FHIR resource create/update/delete
  createPatient(input: PatientInput!): Patient
  updatePatient(id: ID!, input: PatientInput!): Patient
  deletePatient(id: ID!): Boolean

  createObservation(input: ObservationInput!): Observation
  updateObservation(id: ID!, input: ObservationInput!): Observation
  deleteObservation(id: ID!): Boolean

  createCondition(input: ConditionInput!): Condition
  updateCondition(id: ID!, input: ConditionInput!): Condition
  deleteCondition(id: ID!): Boolean

  createMedicationRequest(input: MedicationRequestInput!): MedicationRequest
  updateMedicationRequest(id: ID!, input: MedicationRequestInput!): MedicationRequest

  createDocumentReference(input: DocumentReferenceInput!): DocumentReference
  updateDocumentReference(id: ID!, input: DocumentReferenceInput!): DocumentReference
  deleteDocumentReference(id: ID!): Boolean

  createSubscription(input: SubscriptionInput!): Subscription
  updateSubscription(id: ID!, input: SubscriptionInput!): Subscription
  deleteSubscription(id: ID!): Boolean

  # 1upHealth platform mutations
  createPatientConnection(userId: ID!, sourceId: ID!, authCode: String): PatientConnection
  deletePatientConnection(id: ID!): Boolean

  createConsentRecord(input: ConsentInput!): ConsentRecord
  revokeConsentRecord(id: ID!): ConsentRecord

  triggerSync(connectionId: ID!): SyncJob
  cancelSyncJob(id: ID!): SyncJob

  createWebhookSubscription(input: WebhookInput!): WebhookEvent
  deleteWebhookSubscription(id: ID!): Boolean
}

