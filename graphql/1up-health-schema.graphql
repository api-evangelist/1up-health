# 1upHealth GraphQL Schema
# FHIR R4 resources and 1upHealth platform types
# Endpoint: https://api.1up.health/fhir/graphql

# ---------------------------------------------------------------------------
# Scalar types
# ---------------------------------------------------------------------------

scalar Date
scalar DateTime
scalar Decimal
scalar URI
scalar URL
scalar Canonical
scalar Code
scalar ID
scalar Instant
scalar PositiveInt
scalar UnsignedInt
scalar Base64Binary
scalar Markdown

# ---------------------------------------------------------------------------
# Shared FHIR backbone types
# ---------------------------------------------------------------------------

type Coding {
  system: URI
  version: String
  code: Code
  display: String
  userSelected: Boolean
}

type CodeableConcept {
  coding: [Coding]
  text: String
}

type Quantity {
  value: Decimal
  comparator: Code
  unit: String
  system: URI
  code: Code
}

type Range {
  low: Quantity
  high: Quantity
}

type Ratio {
  numerator: Quantity
  denominator: Quantity
}

type Period {
  start: DateTime
  end: DateTime
}

type Timing {
  event: [DateTime]
  repeat: TimingRepeat
  code: CodeableConcept
}

type TimingRepeat {
  boundsDuration: Quantity
  count: PositiveInt
  frequency: PositiveInt
  period: Decimal
  periodUnit: Code
  dayOfWeek: [Code]
  timeOfDay: [String]
}

type HumanName {
  use: Code
  text: String
  family: String
  given: [String]
  prefix: [String]
  suffix: [String]
  period: Period
}

type Address {
  use: Code
  type: Code
  text: String
  line: [String]
  city: String
  district: String
  state: String
  postalCode: String
  country: String
  period: Period
}

type ContactPoint {
  system: Code
  value: String
  use: Code
  rank: PositiveInt
  period: Period
}

type Identifier {
  use: Code
  type: CodeableConcept
  system: URI
  value: String
  period: Period
}

type Reference {
  reference: String
  type: URI
  identifier: Identifier
  display: String
}

type Annotation {
  authorReference: Reference
  authorString: String
  time: DateTime
  text: Markdown
}

type Attachment {
  contentType: Code
  language: Code
  data: Base64Binary
  url: URL
  size: UnsignedInt
  hash: Base64Binary
  title: String
  creation: DateTime
}

type Meta {
  versionId: ID
  lastUpdated: Instant
  source: URI
  profile: [Canonical]
  security: [Coding]
  tag: [Coding]
}

type Narrative {
  status: Code
  div: String
}

type Extension {
  url: URI
  valueString: String
  valueBoolean: Boolean
  valueInteger: Int
  valueDecimal: Decimal
  valueDateTime: DateTime
  valueCode: Code
  valueCodeableConcept: CodeableConcept
  valueReference: Reference
  valueQuantity: Quantity
}

